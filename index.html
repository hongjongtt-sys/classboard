<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    :root { --primary: #1a365d; --accent: #3182ce; --bg: #f7fafc; --white: #ffffff; }
    body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; color: #2d3748; }
    .login-overlay { position: fixed; inset: 0; background: var(--primary); display: flex; align-items: center; justify-content: center; z-index: 2000; }
    .login-box { background: var(--white); padding: 40px; border-radius: 20px; width: 90%; max-width: 380px; text-align: center; box-shadow: 0 20px 25px rgba(0,0,0,0.2); }
    .mobile-header { display: none; background: var(--primary); color: white; padding: 15px 20px; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 999; }
    .menu-toggle-btn { background: none; border: none; color: white; font-size: 22px; cursor: pointer; }
    .dashboard { display: none; min-height: 100vh; grid-template-columns: 260px 1fr; }
    .sidebar { background: var(--primary); color: white; padding: 25px 15px; display: flex; flex-direction: column; z-index: 1001; transition: transform 0.3s ease; }
    .nav-item { padding: 14px 18px; cursor: pointer; border-radius: 10px; margin-bottom: 5px; display: flex; align-items: center; gap: 12px; transition: 0.2s; font-size: 15px; }
    .nav-item:hover, .nav-item.active { background: var(--accent); }
    .content { padding: 40px; overflow-y: auto; min-width: 0; }
    .card { background: var(--white); padding: 25px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 25px; overflow: hidden; }
    .section { display: none; }
    .section.active { display: block; animation: fadeIn 0.4s ease; }
    .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; margin-top: 15px; border-radius: 8px; border: 1px solid #e2e8f0; }
    table { width: 100%; border-collapse: collapse; min-width: 600px; }
    th, td { border: 1px solid #e2e8f0; padding: 12px; text-align: center; vertical-align: middle; white-space: nowrap; }
    th { background: #f8fafc; color: #4a5568; font-size: 14px; font-weight: 700; }
    td { font-size: 14px; color: #2d3748; white-space: pre-wrap; word-break: break-all; }
    .chart-container { position: relative; width: 100%; height: 280px; }
    input, select { width: 100%; padding: 12px; margin: 8px 0 15px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
    .btn { background: var(--accent); color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 15px; }
    .badge { padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 12px; }
    .badge-wait { background: #fee2e2; color: #ef4444; }
    .badge-done { background: #dcfce7; color: #22c55e; }
    .logout-btn { margin-top: auto; color: #feb2b2; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; cursor: pointer; }
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 768px) {
      .mobile-header { display: flex; }
      .dashboard { grid-template-columns: 1fr; }
      .sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: 250px; transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .sidebar-overlay.open { display: block; }
      .content { padding: 20px; }
      .card { padding: 15px; }
      .chart-container { height: 220px; }
      #aiChatBox { width: calc(100% - 40px) !important; right: 20px !important; left: 20px !important; }
    }
  </style>
</head>
<body>

<div id="loginArea" class="login-overlay">
  <div class="login-box">
    <h2 style="margin-top:0;">학생 성장 관리 시스템</h2>
    <input type="text" id="uid" placeholder="학번">
    <input type="password" id="upw" placeholder="비밀번호">
    <button class="btn" onclick="tryLogin()">로그인</button>
  </div>
</div>

<div id="mobileBar" class="mobile-header">
  <button class="menu-toggle-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
  <span id="mobileTitle" style="font-weight: bold; font-size: 16px;">대시보드</span>
  <div style="width: 22px;"></div>
</div>

<div id="sidebarOverlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>

<div id="app" class="dashboard">
  <div id="sidebarMenu" class="sidebar">
    <h3 id="studentNameDisplay" style="margin-bottom:25px; padding-left:15px;">학생님</h3>
    <div class="nav-item active" onclick="switchTab('main', this)"><i class="fa-solid fa-house"></i> 대시보드</div>
    <div class="nav-item" onclick="switchTab('grade1', this)"><i class="fa-solid fa-1"></i> 1학년 성적</div>
    <div class="nav-item" onclick="switchTab('grade2-1', this)"><i class="fa-solid fa-calendar-check"></i> 2학년 1학기</div>
    <div class="nav-item" onclick="switchTab('grade2-2', this)"><i class="fa-solid fa-calendar-day"></i> 2학년 2학기</div>
    <div class="nav-item" onclick="switchTab('mock', this)"><i class="fa-solid fa-pen-to-square"></i> 모의고사</div>
    <div class="nav-item" onclick="switchTab('self', this)"><i class="fa-solid fa-user-gear"></i> 자율활동</div>
    <div class="nav-item" onclick="switchTab('career', this)"><i class="fa-solid fa-compass"></i> 진로활동</div>
    <div class="nav-item" onclick="switchTab('gap', this)"><i class="fa-solid fa-bullseye"></i> 목표대학 갭분석</div>
    <div class="nav-item" onclick="switchTab('talk', this)"><i class="fa-solid fa-comments"></i> 상담활동</div>
    <div class="nav-item logout-btn" onclick="location.reload()">
      <i class="fa-solid fa-power-off"></i> 로그아웃
    </div>
  </div>

  <div class="content">
    <div id="main" class="section active">
      <h1 style="font-size: 24px; margin-top: 0;">나의 학습 분석 대시보드</h1>
      <div class="card" style="background: linear-gradient(135deg, #1a365d 0%, #3182ce 100%); color: white; margin-bottom: 20px;">
        <!-- ★ [개선] 명언 칸이 카드 안에 처음부터 자리잡고, 비동기로 채워짐 -->
        <div id="aiQuoteBox" style="text-align:center; padding: 10px 0 14px; font-size:14px; font-weight:bold; border-bottom: 1px solid rgba(255,255,255,0.2); margin-bottom:14px; opacity:0.85;">
          🌟 진로 명언 불러오는 중...
        </div>
        <div id="ddayContainer" style="display: flex; justify-content: space-around; align-items: center; text-align: center; min-height: 60px;">
          로딩 중...
        </div>
      </div>
      <div class="card">
        <h3 style="margin-top: 0;">📈 학업 성장 곡선 (원점수 평균)</h3>
        <div class="chart-container"><canvas id="growthChart"></canvas></div>
      </div>
      <div class="card">
        <h3 style="margin-top: 0;">📊 석차 등급 추이 (등급 평균)</h3>
        <p style="font-size: 12px; color: #718096; margin-top:-10px;">* 등급은 낮을수록(1등급에 가까울수록) 상단에 위치합니다.</p>
        <div class="chart-container"><canvas id="gradeChart"></canvas></div>
      </div>
    </div>

    <div id="tabContent" class="section">
      <h1 id="tabTitle" style="font-size: 24px; margin-top: 0;">제목</h1>
      <div id="tableDisplay"></div>
    </div>
  </div>
</div>

<script>
  let studentDB = {};
  let growthChart = null;
  let gradeChart = null;
  let chatMemory = [];
  let currentCareer = "아직 정해지지 않음";

  document.addEventListener('DOMContentLoaded', function() {
    ['uid', 'upw'].forEach(id => {
      document.getElementById(id).addEventListener('keypress', function(e) {
        if (e.key === 'Enter') tryLogin();
      });
    });
  });

  function toggleSidebar() {
    document.getElementById('sidebarMenu').classList.toggle('open');
    document.getElementById('sidebarOverlay').classList.toggle('open');
  }

  function tryLogin() {
    const btn = document.querySelector('#loginArea .btn');
    btn.innerText = "로그인 중..."; btn.disabled = true; btn.style.opacity = "0.7";
    const id = document.getElementById('uid').value;
    const pw = document.getElementById('upw').value;

    google.script.run.withSuccessHandler(res => {
      btn.innerText = "로그인"; btn.disabled = false; btn.style.opacity = "1";
      if (res.success) {
        studentDB = res.data;
        currentCareer = res.career || "아직 정해지지 않음";
        document.getElementById('loginArea').style.display = 'none';
        document.getElementById('app').style.display = 'grid';
        document.getElementById('studentNameDisplay').innerText = res.name + " 학생";
        updateDday();
        initChart();
        // ★ [개선] 명언을 로그인 완료 후 별도 비동기 요청
        loadQuoteAsync(currentCareer);
      } else {
        alert(res.msg);
      }
    })
    .withFailureHandler(() => {
      btn.innerText = "로그인"; btn.disabled = false; btn.style.opacity = "1";
      alert("서버 연결에 실패했습니다.");
    })
    .loginAndFetchAll(id, pw);
  }

  // ★ [신규] 명언 비동기 로드
  function loadQuoteAsync(career) {
    const quoteBox = document.getElementById('aiQuoteBox');
    google.script.run
      .withSuccessHandler(function(quote) {
        if (quoteBox && quote) {
          quoteBox.innerHTML = `🌟 오늘 나를 위한 진로 명언<br><span style="font-size:15px; color:#bee3f8; display:inline-block; margin-top:5px;">${quote}</span>`;
          quoteBox.style.opacity = "1";
        }
      })
      .withFailureHandler(function() {
        if (quoteBox) quoteBox.innerHTML = '🌟 오늘도 최선을 다하는 하루가 되세요!';
      })
      .fetchQuoteOnly(career);
  }

  function updateDday() {
    try {
      const allEvents = [
        { name: '6월 모의고사', date: '2026-06-04' }, { name: '1학기 기말고사', date: '2026-07-03' },
        { name: '여름방학식', date: '2026-07-21' }, { name: '2학기 개학', date: '2026-08-06' },
        { name: '9월 모의고사', date: '2026-09-02' }, { name: '2학기 중간고사', date: '2026-10-02' },
        { name: '10월 모의고사', date: '2026-10-20' }, { name: '2학기 기말고사', date: '2026-12-09' },
        { name: '겨울방학', date: '2026-12-24' }, { name: '방학 중 등교일', date: '2027-02-12' }
      ];
      const now = new Date(); now.setHours(0,0,0,0);
      const toLocal = (d) => new Date(d + 'T00:00:00');   // 로컬 자정 기준 파싱
      const displayEvents = allEvents.filter(e => toLocal(e.date) >= now).slice(0, 3);
      const container = document.getElementById('ddayContainer');
      if (!container) return;
      if (displayEvents.length === 0) { container.innerHTML = "<div style='width:100%'>예정된 주요 일정이 없습니다.</div>"; return; }
      let html = "";
      displayEvents.forEach((item, index) => {
        const target = toLocal(item.date);
        const days = Math.round((target - now) / (1000 * 60 * 60 * 24));
        html += `<div style="flex: 1;"><div style="font-size: 11px; opacity: 0.9;">${item.name}</div><div style="font-size: 16px; font-weight: bold; margin-top: 3px;">${days === 0 ? "D-Day" : "D-" + days}</div></div>${index < displayEvents.length - 1 ? '<div style="width: 1px; height: 30px; background: rgba(255,255,255,0.3);"></div>' : ''}`;
      });
      container.innerHTML = html;
    } catch(e) { console.error(e); }
  }

  function initChart() {
    const sLabels = ["1-1", "1-2", "2-1중간", "2-1기말", "2-1말", "2-2중간", "2-2기말", "2-2말"];
    const sSheets = ["1학년 1학기 성적(원점수)", "1학년 2학기 성적(원점수)", "2학년 1학기 중간", "2학년 1학기 기말", "2학년 1학기말", "2학년 2학기 중간", "2학년 2학기 기말", "2학년 2학기말"];
    const sData = sSheets.map(s => {
      if (!studentDB[s]) return null;
      const { headers, values } = studentDB[s];
      const idx = headers.findIndex(h => h.includes("평균"));
      if (idx !== -1) return Number(values[idx]) || null;
      const nums = values.slice(2).map(Number).filter(v => !isNaN(v) && v > 0 && v <= 100);
      return nums.length ? parseFloat((nums.reduce((a,b)=>a+b)/nums.length).toFixed(1)) : null;
    });

    const gLabels = ["1학년 1학기", "1학년 2학기", "2학년 1학기", "2학년 2학기"];
    const gSheets = ["1학년 1학기 성적(원점수)", "1학년 2학기 성적(원점수)", "2학년 1학기말", "2학년 2학기말"];
    const gData = gSheets.map(s => {
      if (!studentDB[s]) return null;
      const { headers, values } = studentDB[s];
      let t = 0, c = 0;
      headers.forEach((h, i) => {
        if (h.includes("등급")) {
          const val = parseInt(String(values[i]).split('/')[0]);
          if (!isNaN(val) && val > 0) { t += val; c++; }
        }
      });
      return c > 0 ? parseFloat((t/c).toFixed(2)) : null;
    });

    if (growthChart) growthChart.destroy();
    growthChart = new Chart(document.getElementById('growthChart'), {
      type: 'line',
      data: { labels: sLabels, datasets: [{ label: '평균 원점수', data: sData, borderColor: '#3182ce', backgroundColor: 'rgba(49,130,206,0.1)', fill: true, tension: 0.3 }] },
      options: { responsive: true, maintainAspectRatio: false, scales: { y: { min: 0, max: 100 } } }
    });

    if (gradeChart) gradeChart.destroy();
    gradeChart = new Chart(document.getElementById('gradeChart'), {
      type: 'line',
      data: { labels: gLabels, datasets: [{ label: '평균 등급', data: gData, borderColor: '#e53e3e', backgroundColor: 'rgba(229,62,62,0.1)', fill: true, tension: 0.3 }] },
      options: { responsive: true, maintainAspectRatio: false, scales: { y: { reverse: true, min: 1, max: 9, ticks: { stepSize: 1 } } } }
    });
  }

  function switchTab(target, el) {
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
    const mainView = document.getElementById('main'), tabView = document.getElementById('tabContent');
    document.getElementById('mobileTitle').innerText = el.innerText.trim();
    if (window.innerWidth <= 768) toggleSidebar();

    if (target === 'main') {
      mainView.classList.add('active'); tabView.classList.remove('active');
    } else if (target === 'gap') {
      mainView.classList.remove('active'); tabView.classList.add('active');
      document.getElementById('tabTitle').innerText = "목표대학 갭분석";
      renderGapAnalysis();
    } else {
      mainView.classList.remove('active'); tabView.classList.add('active');
      renderTable(target);
    }
  }

  function renderTable(target) {
  const display = document.getElementById('tableDisplay');
  let title = "", sheets = [];
  switch(target) {
    case 'grade1': title = "1학년 성적"; sheets = ["1학년 1학기 성적(원점수)", "1학년 2학기 성적(원점수)"]; break;
    case 'grade2-1': title = "2학년 1학기"; sheets = ["2학년 1학기 중간", "2학년 1학기 기말", "2학년 1학기말"]; break;
    case 'grade2-2': title = "2학년 2학기"; sheets = ["2학년 2학기 중간", "2학년 2학기 기말", "2학년 2학기말"]; break;
    case 'mock': title = "모의고사"; sheets = ["3월 모고", "6월 모고", "9월 모고", "10월 모고"]; break;
    case 'self': title = "자율활동 기록"; sheets = ["자율활동"]; break;
    case 'career': title = "진로활동 기록"; sheets = ["진로활동"]; break;
    case 'talk': title = "상담활동 기록"; sheets = ["상담활동"]; break;
  }
  document.getElementById('tabTitle').innerText = title;
  display.innerHTML = "";

  // 쌍으로 묶는 시트 (과목명 + 등급/성취도)
  const pairedSheets = [
    "1학년 1학기 성적(원점수)", "1학년 2학기 성적(원점수)",
    "2학년 1학기말", "2학년 2학기말"
  ];
  // 모의고사 시트
  const mockSheets = ["3월 모고", "6월 모고", "9월 모고", "10월 모고"];
  // 점수만 있는 시트 (중간/기말)
  const scoreOnlySheets = [
    "2학년 1학기 중간", "2학년 1학기 기말",
    "2학년 2학기 중간", "2학년 2학기 기말"
  ];

  sheets.forEach(s => {
    if (!studentDB[s]) {
      display.innerHTML += `<div class="card" style="color:red;">'${s}' 시트를 찾을 수 없습니다.</div>`;
      return;
    }

    const headers = studentDB[s].headers;
    const values = studentDB[s].values;

    // 자율활동, 진로활동, 상담활동은 텍스트형
    if (['self', 'career', 'talk'].includes(target)) {
      // 칸 이름의 괄호 앞부분(base)이 같은 것끼리 묶기
      const groups = [];
      const idxOf = {};
      headers.forEach((h, i) => {
        if (i === 0) return;
        const m = String(h).match(/^(.*?)\((.*)\)\s*$/);
        const base = (m ? m[1] : h).trim();
        const sub  = m ? m[2].trim() : null;
        const val  = values[i];
        const empty = (val === undefined || val === null || String(val).trim() === '');
        // 괄호 없는 일반 칸(이름 등)은 비어있으면 건너뜀. 괄호 항목(1/4 등)은 비어도 '미제출'로 표시.
        if (sub === null && empty) return;
        if (!(base in idxOf)) { idxOf[base] = groups.length; groups.push({ base, items: [] }); }
        groups[idxOf[base]].items.push({ sub, value: val, empty });
      });

      let textHtml = "";
      groups.forEach(g => {
        if (g.items.length === 1 && g.items[0].sub === null) {
          // 괄호 없는 단일 항목 (예: 이름)
          textHtml += `
            <div style="margin-bottom: 16px; padding: 14px; background: #f8fafc; border-radius: 10px; border-left: 4px solid #3182ce;">
              <div style="font-size: 12px; color: #718096; margin-bottom: 6px; font-weight: bold;">${g.base}</div>
              <div style="font-size: 14px; color: #2d3748; line-height: 1.8; white-space: pre-wrap;">${g.items[0].value}</div>
            </div>`;
        } else {
          // 같은 활동(괄호 앞이 같음)을 한 줄에 가로로 — 빈 칸은 미제출(X)
          const cells = g.items.map(it => {
            const body = it.empty
              ? `<div style="font-size: 13px; color: #e53e3e; font-weight: 600;">❌ 미제출</div>`
              : `<div style="font-size: 14px; color: #2d3748; line-height: 1.7; white-space: pre-wrap;">${it.value}</div>`;
            const bg = it.empty ? '#fff5f5' : '#fff';
            const bd = it.empty ? '#fed7d7' : '#e2e8f0';
            return `
            <div style="flex: 1; min-width: 150px; background: ${bg}; border: 1px solid ${bd}; border-radius: 8px; padding: 10px 12px;">
              ${it.sub ? `<div style="font-size: 11px; color: #718096; margin-bottom: 4px; font-weight: bold;">${it.sub}</div>` : ''}
              ${body}
            </div>`;
          }).join('');
          textHtml += `
            <div style="margin-bottom: 16px; padding: 14px; background: #f8fafc; border-radius: 10px; border-left: 4px solid #3182ce;">
              <div style="font-size: 13px; color: #2d3748; margin-bottom: 10px; font-weight: bold;">${g.base}</div>
              <div style="display: flex; flex-wrap: wrap; gap: 10px;">${cells}</div>
            </div>`;
        }
      });
      display.innerHTML += `<div class="card"><h3>${s}</h3>${textHtml || '<p style="color:#718096;">데이터가 없습니다.</p>'}</div>`;
      return;
    }

    let cardsHtml = "";

    if (pairedSheets.includes(s)) {
      // 과목명 + 등급/성취도 쌍으로 묶기 (i=2부터 2칸씩)
      for (let i = 2; i < headers.length; i += 2) {
        const subjectName = headers[i];
        const gradeValue = values[i+1] !== undefined ? String(values[i+1]) : "";
        const scoreValue = values[i] !== undefined ? String(values[i]) : "";
        if (!subjectName || subjectName === '') continue;

        let badgeColor = "#e2e8f0"; let textColor = "#2d3748";
        const gradeMatch = gradeValue.match(/^(\d)/);
        if (gradeMatch) {
          const g = parseInt(gradeMatch[1]);
          if (g === 1) { badgeColor = "#c6f6d5"; textColor = "#22543d"; }
          else if (g === 2) { badgeColor = "#bee3f8"; textColor = "#2a4365"; }
          else if (g === 3) { badgeColor = "#fefcbf"; textColor = "#744210"; }
          else if (g >= 4) { badgeColor = "#fed7d7"; textColor = "#742a2a"; }
        }

        cardsHtml += `
          <div style="background: #f8fafc; border-radius: 10px; padding: 14px; border: 1px solid #e2e8f0;">
            <div style="font-size: 12px; color: #718096; margin-bottom: 6px; font-weight: bold;">${subjectName}</div>
            <div style="font-size: 13px; color: #2d3748; margin-bottom: 6px;">점수: <strong>${scoreValue || '-'}</strong></div>
            <div style="font-size: 12px; font-weight: bold; padding: 3px 8px; background: ${badgeColor}; color: ${textColor}; border-radius: 6px; display: inline-block;">${gradeValue || '-'}</div>
          </div>`;
      }

    } else if (mockSheets.includes(s)) {
  // 모의고사: 과목별로 직접 처리
  for (let i = 2; i < headers.length; i++) {
    const h = headers[i];
    if (!h || h === '') continue;

    // 등급만 있는 단독 컬럼 (영어, 한국사)
    const isGradeOnly = h === '영어(등급)' || h === '한국사(등급)';
    // 등급 컬럼 (앞 과목의 등급)
    const isGradeCol = h === '등급';

    if (isGradeCol) continue; // 등급은 앞 과목 카드에서 처리하므로 스킵

    const scoreValue = String(values[i] || '');
    let gradeValue = '';

    if (isGradeOnly) {
      // 영어/한국사는 이 셀 자체가 등급
      gradeValue = scoreValue;
    } else {
      // 표준점수가 있는 과목은 다음 셀이 등급
      gradeValue = String(values[i+1] || '');
    }

    let badgeColor = "#e2e8f0"; let textColor = "#2d3748";
    const gradeMatch = gradeValue.match(/^(\d)/);
    if (gradeMatch) {
      const g = parseInt(gradeMatch[1]);
      if (g === 1) { badgeColor = "#c6f6d5"; textColor = "#22543d"; }
      else if (g === 2) { badgeColor = "#bee3f8"; textColor = "#2a4365"; }
      else if (g === 3) { badgeColor = "#fefcbf"; textColor = "#744210"; }
      else if (g >= 4) { badgeColor = "#fed7d7"; textColor = "#742a2a"; }
    }

    cardsHtml += `
      <div style="background: #f8fafc; border-radius: 10px; padding: 14px; border: 1px solid #e2e8f0;">
        <div style="font-size: 12px; color: #718096; margin-bottom: 6px; font-weight: bold;">${h}</div>
        ${isGradeOnly ? '' : `<div style="font-size: 13px; color: #2d3748; margin-bottom: 6px;">표준점수: <strong>${scoreValue || '-'}</strong></div>`}
        <div style="font-size: 12px; font-weight: bold; padding: 3px 8px; background: ${badgeColor}; color: ${textColor}; border-radius: 6px; display: inline-block;">${gradeValue ? gradeValue + '등급' : '-'}</div>
      </div>`;
  }


    } else if (scoreOnlySheets.includes(s)) {
      // 중간/기말: 점수만 있음 (i=2부터 1칸씩)
      for (let i = 2; i < headers.length; i++) {
        const subjectName = headers[i];
        const scoreValue = values[i] !== undefined ? String(values[i]) : "";
        if (!subjectName || subjectName === '') continue;

        // 합계/평균은 다른 색으로
        const isTotal = subjectName.includes('합계') || subjectName.includes('평균');
        cardsHtml += `
          <div style="background: ${isTotal ? '#ebf8ff' : '#f8fafc'}; border-radius: 10px; padding: 14px; border: 1px solid #e2e8f0;">
            <div style="font-size: 12px; color: #718096; margin-bottom: 6px; font-weight: bold;">${subjectName}</div>
            <div style="font-size: 15px; font-weight: bold; color: ${isTotal ? '#2b6cb0' : '#2d3748'};">${scoreValue || '-'}</div>
          </div>`;
      }
    }

    display.innerHTML += `
      <div class="card">
        <h3>${s}</h3>
        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-top: 10px;">
          ${cardsHtml || '<p style="color:#718096;">데이터가 없습니다.</p>'}
        </div>
      </div>`;
  });
}
function renderGapAnalysis() {
  const display = document.getElementById('tableDisplay');
  display.innerHTML = "<div class='card'>목표대학 정보 불러오는 중...</div>";
  
  google.script.run.withSuccessHandler(function(res) {
    if (!res.success) {
      display.innerHTML = `<div class='card' style='color:red;'>${res.message}</div>`;
      return;
    }
    
    const targets = res.targets || [];
    
    // 목표대학 입력 폼 (최대 3개)
    let formRows = "";
    for (let i = 0; i < 3; i++) {
      const t = targets[i] || { university: "", major: "", type: "" };
      formRows += `
        <div style="display: flex; gap: 10px; margin-bottom: 10px; align-items: center;">
          <span style="min-width: 50px; font-weight: bold; color: #4a5568;">목표${i+1}</span>
          <input type="text" id="univ_${i}" placeholder="대학명" value="${t.university}" style="flex:2; margin:0; padding: 8px;">
          <input type="text" id="major_${i}" placeholder="학과명" value="${t.major}" style="flex:2; margin:0; padding: 8px;">
          <select id="type_${i}" style="flex:1; margin:0; padding: 8px;">
            <option value="">전형선택</option>
            <option value="학생부교과" ${t.type === '학생부교과' ? 'selected' : ''}>학생부교과</option>
            <option value="학생부종합" ${t.type === '학생부종합' ? 'selected' : ''}>학생부종합</option>
            <option value="논술" ${t.type === '논술' ? 'selected' : ''}>논술</option>
            <option value="정시" ${t.type === '정시' ? 'selected' : ''}>정시</option>
          </select>
        </div>`;
    }
    
    display.innerHTML = `
      <div class="card">
        <h3>🎯 목표대학 설정</h3>
        <p style="font-size:13px; color:#718096; margin-top:-10px;">최대 3개까지 설정 가능합니다.</p>
        ${formRows}
        <button class="btn" style="margin-top:10px;" onclick="saveAndAnalyze()">저장 후 갭분석 시작</button>
      </div>
      <div id="gapResult"></div>`;
      
  }).getTargetUniversities();
}

function saveAndAnalyze() {
  let targets = [];
  for (let i = 0; i < 3; i++) {
    const univ = document.getElementById('univ_' + i).value.trim();
    const major = document.getElementById('major_' + i).value.trim();
    const type = document.getElementById('type_' + i).value.trim();
    if (univ) targets.push({ university: univ, major: major, type: type });
  }
  
  if (targets.length === 0) { alert('목표대학을 최소 1개 입력해주세요.'); return; }
  
  const btn = document.querySelector('#tableDisplay .btn');
  btn.disabled = true; btn.innerText = "저장 중...";
  
  google.script.run.withSuccessHandler(function(saveRes) {
    if (!saveRes.success) { alert('저장 실패: ' + saveRes.message); btn.disabled = false; btn.innerText = "저장 후 갭분석 시작"; return; }
    
    btn.innerText = "AI 갭분석 중...";
    const resultDiv = document.getElementById('gapResult');
    resultDiv.innerHTML = "<div class='card' style='text-align:center; color:#718096;'>AI가 입결 자료를 분석하고 있습니다. 잠시만 기다려주세요...</div>";
    
    google.script.run.withSuccessHandler(function(analysis) {
      btn.disabled = false; btn.innerText = "저장 후 갭분석 시작";
      resultDiv.innerHTML = `
        <div class="card">
          <h3>📊 갭분석 결과</h3>
          <div style="white-space: pre-wrap; line-height: 1.8; font-size: 14px;">${analysis}</div>
        </div>`;
    })
    .withFailureHandler(function(err) {
      btn.disabled = false; btn.innerText = "저장 후 갭분석 시작";
      resultDiv.innerHTML = `<div class='card' style='color:red;'>분석 실패: ${err.message}</div>`;
    })
    .analyzeGap(targets);
  })
  .withFailureHandler(function(err) {
    btn.disabled = false; btn.innerText = "저장 후 갭분석 시작";
    alert('오류: ' + err.message);
  })
  .saveTargetUniversities(targets);
}
</script>

<div id="aiOpenBtn" onclick="toggleAiChat()" style="position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background: #3182ce; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1000; box-shadow: 0 4px 6px rgba(0,0,0,0.1); font-size: 24px;">🤖</div>
<div id="aiChatBox" style="display: none; position: fixed; bottom: 90px; right: 20px; width: 350px; height: 500px; background: white; border: 1px solid #ddd; border-radius: 10px; flex-direction: column; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.15);">
  <div style="background: #3182ce; color: white; padding: 15px; border-radius: 10px 10px 0 0; font-weight: bold; display: flex; justify-content: space-between;">
    <span>성적 상담 AI 선생님</span><span onclick="toggleAiChat()" style="cursor:pointer;">✕</span>
  </div>
  <div id="chatDisplay" style="flex: 1; overflow-y: auto; padding: 15px; font-size: 14px; background: #f7fafc;"></div>
  <div style="padding: 15px; border-top: 1px solid #eee; display: flex; flex-direction: column; gap: 8px;">
    <div style="display: flex; gap: 5px;">
      <input type="text" id="aiInput" placeholder="질문을 입력하세요..." style="flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 4px;" onkeypress="if(event.keyCode==13) askAIBot()">
      <button id="sendBtn" onclick="askAIBot()" style="padding: 8px 15px; background: #3182ce; color: white; border: none; border-radius: 4px; cursor: pointer;">전송</button>
    </div>
    <button id="saveSummaryBtn" onclick="endAndSaveSummary()" style="background-color: #e53e3e; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 13px;">
      🔴 상담 종료 및 요약 시트 저장
    </button>
  </div>
</div>

<script>
  function toggleAiChat() {
    var cb = document.getElementById('aiChatBox');
    cb.style.display = (cb.style.display === 'none' || cb.style.display === '') ? 'flex' : 'none';
  }

  function askAIBot() {
    var input = document.getElementById('aiInput');
    var display = document.getElementById('chatDisplay');
    var btn = document.getElementById('sendBtn');
    var question = input.value.trim();
    if (!question) return;
    btn.disabled = true; btn.innerText = "생각 중...";

    display.innerHTML += `<div style="text-align: right; margin-bottom: 20px;"><span style="background: #3182ce; color: white; padding: 10px 15px; border-radius: 15px 15px 0 15px; display: inline-block; max-width: 80%; line-height: 1.5; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">${question}</span></div>`;
    input.value = "";
    display.scrollTop = display.scrollHeight;

    let historyText = chatMemory.slice(-4).join("\n");

    google.script.run.withSuccessHandler(function(res) {
      btn.disabled = false; btn.innerText = "전송";
      display.innerHTML += `<div style="text-align: left; margin-bottom: 25px;">
  <div style="font-size: 12px; color: #718096; margin-left: 5px; margin-bottom: 5px;">AI 선생님</div>
  <div style="background: white; border: 1px solid #e2e8f0; color: #2d3748; padding: 12px 15px; border-radius: 15px 15px 15px 0; display: inline-block; max-width: 85%; line-height: 1.8; box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-size: 14px;">
    ${marked.parse(res)}
  </div>
</div>`;
      display.scrollTop = display.scrollHeight;
      chatMemory.push("학생: " + question);
      chatMemory.push("AI: " + res);
    }).askAI(question, historyText);
  }

  function endAndSaveSummary() {
    var display = document.getElementById('chatDisplay');
    var btn = document.getElementById('saveSummaryBtn');
    var fullChatHistory = chatMemory.join("\n");
    if (!fullChatHistory || fullChatHistory.trim() === "") { alert("대화 내역이 없습니다."); return; }
    if (!confirm("상담 요약본을 시트에 저장하시겠습니까?")) return;
    btn.disabled = true; btn.innerText = "요약 추출 중...";
    var summaryPrompt = "우리가 방금 나눈 대화의 핵심을 구글 시트 상담로그에 기록할 '2~3줄짜리 짧은 상담 내용 요약문'만 다른 미사여구 없이 적어줘.";
    google.script.run.withSuccessHandler(function(aiSummary) {
      google.script.run.withSuccessHandler(function(result) {
        if (result === "성공") {
          alert("저장되었습니다.");
          btn.disabled = false; btn.innerText = "🔴 상담 종료 및 요약 시트 저장";
          display.innerHTML = "";
          chatMemory = [];
          toggleAiChat();
        } else {
          alert("실패: " + result);
          btn.disabled = false; btn.innerText = "🔴 상담 종료 및 요약 시트 저장";
        }
      }).saveSummaryToSheet(aiSummary);
    }).askAI(summaryPrompt, fullChatHistory);
  }
</script>
